name: ci
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      # IN CI, A SKIPPED TEST IS A FAILED TEST.
      #
      # CI is the one place where every dependency is meant to be present, so a skip here does not
      # mean "not applicable" — it means a guard fired that should not have, and nobody reads
      # "skipped". This is the net under that. (anvil shipped `pass 11 · skipped 9`, green, for the
      # life of the project because a broken sandbox switched off the very tests that would catch it.)
      - name: run the tests — and none of them may be skipped
        run: |
          node --test 2>&1 | tee "$RUNNER_TEMP/test.txt"
          code=${PIPESTATUS[0]}
          test "$code" -eq 0 || exit $code
          n=$(grep -oE '^# skipped [0-9]+|^. skipped [0-9]+' "$RUNNER_TEMP/test.txt" | grep -oE '[0-9]+$' | head -1)
          echo "skipped: ${n:-0}"
          if [ "${n:-0}" -ne 0 ]; then
            echo "::error::${n} test(s) skipped in CI. Everything they need is installed here — a skip means a guard misfired, and a green build is hiding it."
            exit 1
          fi

  # prism is a data reader, so its worst failure mode is choking on ADVERSARIAL data — a giant file, a
  # pathologically deep or wide structure, a malformed blob. `test` proves the bounds on small inputs;
  # this proves the process actually SURVIVES hostile ones end-to-end (bytes-capped, depth-capped, no
  # OOM, no hang), through the real CLI, in bounded wall-clock. A bound that only holds in a unit test
  # but not through the shell is not a bound.
  adversarial:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: a hostile blob must be refused or bounded — never OOM, never hang
        run: |
          set -e
          # 1) a file far over the cap is refused up front, fast, without being read into memory
          node -e 'const{writeFileSync}=require("fs");writeFileSync("/tmp/huge.json","["+Array.from({length:3_000_000},(_,i)=>i).join(",")+"]")'
          timeout 20 node src/cli.js shape /tmp/huge.json --max-bytes 1000000 2>&1 | grep -q "caps input" \
            || { echo "::error::an over-cap file was not refused"; exit 1; }
          # 2) but a within-cap million-element array still shapes fast (sampled, not walked)
          timeout 20 node src/cli.js shape /tmp/huge.json | grep -q '"len": 3000000' \
            || { echo "::error::a large within-cap array did not shape"; exit 1; }
          # 3) a deeply nested blob does not blow the stack — it truncates
          node -e 'let s="1";for(let i=0;i<20000;i++)s="["+s+"]";process.stdout.write(s)' > /tmp/deep.json
          timeout 20 node src/cli.js shape /tmp/deep.json --depth 5 | grep -q '"truncated": true' \
            || { echo "::error::deep nesting did not truncate safely"; exit 1; }
          # 4) malformed input is a clean error, not a crash (exit 1, message on stderr)
          if echo '{ not json' | node src/cli.js shape - 2>/tmp/err.txt; then
            echo "::error::malformed JSON did not exit non-zero"; exit 1
          fi
          grep -q "invalid JSON" /tmp/err.txt || { echo "::error::malformed JSON had no clear message"; exit 1; }
          echo "all adversarial inputs bounded ✓"

  # LOOKING is part of the build. `test` proves the logic; a suite does not look at the page. This
  # renders the web view WITH a real document loaded — the shape tree, the reader, the value pane —
  # and audits it at phone/tablet/desktop against the kit's design system (tokens: kit, strict). The
  # first pass already caught two real defects the DOM checks were blind to: the tree rows were
  # clickable but not keyboard-reachable (unreachable-control), and a render wiped the welcome node
  # out from under an async restore. The eye stopped both.
  look:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: serve it, then drive it to a LOADED document
        run: |
          node src/cli.js serve --port 7970 &
          for i in $(seq 30); do curl -sf http://localhost:7970/api/health >/dev/null && break; sleep 1; done
          curl -sf http://localhost:7970/api/health >/dev/null || { echo "::error::prism serve did not start"; exit 1; }
      - uses: tools-for-agents/iris@main
        with:
          url: http://localhost:7970/
          viewports: phone,tablet,desktop
          name: prism-view
          tokens: kit      # the kit's ONE design system — iris/tokens.json, not a copy
          strict: true
          # every interactive surface, hovered — a hover state JS cannot pose is a state nothing renders
          hover: '.btn, .btn.ghost, #find, #src, .row, .crumb .copy'
          pre: >-
            const wait=async(sel,ms=9000)=>{const t=Date.now()+ms;while(Date.now()<t){if(document.querySelector(sel))return;await new Promise(r=>setTimeout(r,50));}throw new Error('timed out waiting for '+sel);};document.getElementById('sample').click();await wait('#treewrap .row');await wait('#readerbody pre.val');

  # THE DIFF VIEW is a distinct rendered state the `look` gate never reaches. It has its own colours
  # (added / removed / changed) and its own change rows, and a hover state nothing else poses. This
  # drives the compare flow — load one blob, paste a second, press Diff — and audits the change list
  # against the same strict design system, so the diff view cannot drift off the tokens on its own.
  look-diff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: serve it, then drive the compare / diff flow
        run: |
          node src/cli.js serve --port 7970 &
          for i in $(seq 30); do curl -sf http://localhost:7970/api/health >/dev/null && break; sleep 1; done
          curl -sf http://localhost:7970/api/health >/dev/null || { echo "::error::prism serve did not start"; exit 1; }
      - uses: tools-for-agents/iris@main
        with:
          url: http://localhost:7970/
          viewports: phone,tablet,desktop
          name: prism-diff
          tokens: kit
          strict: true
          hover: '.btn, #diffit, .row'
          pre: >-
            const wait=async(sel,ms=9000)=>{const t=Date.now()+ms;while(Date.now()<t){if(document.querySelector(sel))return;await new Promise(r=>setTimeout(r,50));}throw new Error('timed out waiting for '+sel);};document.getElementById('paste').value='{"page":1,"total":100,"user":{"name":"Ada","active":true},"tags":["x","y"]}';document.getElementById('shapeit').click();await wait('#treewrap .row');document.getElementById('comparetoggle').click();document.getElementById('paste-b').value='{"page":1,"total":250,"user":{"name":"Ada","active":false},"tags":["x","y","z"],"cursor":"ab12"}';document.getElementById('diffit').click();await wait('#readerbody .dk');

  # THE EMPTY STATE IS THE ONE STATE EVERY NEW USER SEES FIRST. The `look` job seeds a document on
  # purpose; a gate that has only ever seen data is a screenshot of a room that is never empty. This
  # renders the view with NOTHING loaded — exactly what a new user gets — and demands the welcome
  # actually renders rather than a blank pane.
  first-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: serve it EMPTY, as a new user gets it
        run: |
          node src/cli.js serve --port 7970 &
          for i in $(seq 30); do curl -sf http://localhost:7970/api/health >/dev/null && break; sleep 1; done
          curl -sf http://localhost:7970/api/current | grep -q '"empty":true' || { echo "::error::a fresh serve should have no document"; exit 1; }
      - uses: tools-for-agents/iris@main
        with:
          url: http://localhost:7970/
          viewports: phone,tablet,desktop
          name: prism-empty
          tokens: kit
          strict: true
          hover: '.btn, .btn.ghost, textarea, #src'
          pre: >-
            const shown=(e)=>{const s=getComputedStyle(e),r=e.getBoundingClientRect();return !!e&&s.visibility!=='hidden'&&s.display!=='none'&&r.width>0&&r.height>0;};if(!shown(document.getElementById('welcome')))throw new Error('a new user with no data must see the welcome, not a blank reader pane');

  # CAN THE TEST SUITE STILL FAIL? `test` proves the code is right; this proves something is still
  # WATCHING. It breaks src/core.js and src/load.js on purpose in the exact places whose breakage
  # would cost the most — int≠float, the depth/key/token/node bounds, the byte cap — and demands the
  # suite goes RED for each. A surviving canary means the test guarding that line stopped guarding it.
  mutants:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: break it on purpose — every canary must die
        run: node scripts/mutants.mjs

  # WHAT DOES THE VIEW DO WHEN THE SERVER SAYS NO? A tool with exactly one way to show "nothing" makes
  # three different truths — you loaded nothing, the load failed, the server is down — render as the
  # same picture. --boot makes every /api/ call fail; the page must SAY the load failed (the error is
  # shown) and must NOT fake a document — it keeps the welcome rather than pretend it has data.
  dead-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - uses: browser-actions/setup-chrome@v1
        id: chrome
      - name: serve it — the API will be made to fail from the browser
        run: |
          node src/cli.js serve --port 7970 &
          for i in $(seq 30); do curl -sf http://localhost:7970/ >/dev/null && break; sleep 1; done
          curl -sf http://localhost:7970/ >/dev/null || { echo "::error::prism serve did not start"; exit 1; }
      - uses: tools-for-agents/iris@main
        with:
          url: http://localhost:7970/
          viewports: phone,desktop
          name: prism-dead-api
          tokens: kit
          boot: >-
            const f=window.fetch;window.fetch=(u,o)=>String(u).includes('/api/')?Promise.resolve(new Response('{"error":"the server said no"}',{status:500,headers:{'content-type':'application/json'}})):f(u,o);
          pre: >-
            const wait=async(f,ms=6000)=>{const t=Date.now()+ms;while(Date.now()<t){if(f())return;await new Promise(r=>setTimeout(r,50));}throw new Error('timed out waiting for the error to show');};document.getElementById('paste').value='{"a":1}';document.getElementById('shapeit').click();const err=document.getElementById('err');await wait(()=>!err.hidden&&err.textContent.trim());const shown=(e)=>{const s=getComputedStyle(e),r=e.getBoundingClientRect();return !!e&&s.visibility!=='hidden'&&s.display!=='none'&&r.width>0&&r.height>0;};if(!shown(document.getElementById('welcome')))throw new Error('the API failed, the page hid the welcome and rendered nothing honest instead of the error');
